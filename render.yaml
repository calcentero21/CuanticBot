services:
  - type: worker          # Worker porque corre en Socket Mode (no HTTP)
    name: youtube-slack-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_APP_TOKEN
        sync: false
    disk:
      name: cookies
      mountPath: /opt/render/project/src
      sizeGB: 1
