services:
  - type: worker          # Worker porque corre en Socket Mode (no HTTP)
    name: youtube-slack-bot
    runtime: python
    buildCommand: |
      apt-get update -qq
      apt-get install -y -qq ffmpeg
      pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: SLACK_BOT_TOKEN
        sync: false       # Lo ingresas manualmente en el dashboard de Render
      - key: SLACK_APP_TOKEN
        sync: false
    disk:
      name: cookies
      mountPath: /opt/render/project/src
      sizeGB: 1           # Para guardar cookies_netscape.txt si la subes
